<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR San Siro</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      #ui {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        z-index: 999;
      }
      #label {
        background: rgba(0,0,0,0.6);
        color: white;
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 14px;
        font-family: sans-serif;
      }
      #buttons {
        display: flex;
        gap: 10px;
      }
      .btn {
        background: white;
        border: none;
        border-radius: 20px;
        padding: 8px 18px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        opacity: 0.85;
      }
      .btn.active {
        background: #333;
        color: white;
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">

    <div id="ui">
      <div id="label">Maßstab: 1:500</div>
      <div id="buttons">
        <button class="btn active" onclick="setScale(500)">1:500</button>
        <button class="btn" onclick="setScale(1000)">1:1000</button>
        <button class="btn" onclick="setScale(5000)">1:5000</button>
      </div>
    </div>

    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
      renderer="logarithmicDepthBuffer: true;"
      vr-mode-ui="enabled: false">

      <a-assets>
        <a-asset-item id="wink-model" src="models/WINK.glb"></a-asset-item>
      </a-assets>

      <a-marker preset="hiro" id="marker">
        <a-entity
          id="model"
          gltf-model="#wink-model"
          position="0 0 0"
          rotation="-90 0 0"
          scale="0.0108 0.0108 0.0108">
        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Modell Breite in GLB: 46.45 Einheiten = 250m real
      // 1 GLB Einheit = 5.38m real
      // Marker in AR.js = 0.08m (8cm)
      // Bei 1:500 → Zielbreite = 250/500 = 0.5m
      // Scale = 0.5 / 46.45 = 0.0108

      const glbWidth = 46.45;
      const realWidth = 250;

      const marker = document.getElementById('marker');
      const model = document.getElementById('model');
      const ui = document.getElementById('ui');
      const label = document.getElementById('label');
      const buttons = document.querySelectorAll('.btn');

      marker.addEventListener('markerFound', () => {
        ui.style.display = 'flex';
      });

      marker.addEventListener('markerLost', () => {
        ui.style.display = 'none';
      });

      function setScale(masstab) {
        // Zielbreite in AR.js Metern
        const targetWidth = realWidth / masstab;
        // Scale = Zielbreite / GLB Breite
        const scaleValue = targetWidth / glbWidth;

        model.setAttribute('scale', `${scaleValue} ${scaleValue} ${scaleValue}`);
        label.textContent = `Maßstab: 1:${masstab}`;

        buttons.forEach(btn => {
          btn.classList.remove('active');
          if (btn.textContent === `1:${masstab}`) btn.classList.add('active');
        });
      }

      setScale(500);
    </script>
  </body>
</html>
