<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AR San Siro</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: sans-serif;
    }

    #ui {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }

    #label {
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 14px;
    }

    #buttons {
      display: flex;
      gap: 10px;
    }

    .btn {
      background: white;
      border: none;
      border-radius: 20px;
      padding: 8px 18px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn.active {
      background: #333;
      color: white;
    }
  </style>
</head>

<body>

<div id="ui">
  <div id="label">Massstab: 1:500</div>
  <div id="buttons">
    <button class="btn active" data-scale="500">1:500</button>
    <button class="btn" data-scale="1000">1:1000</button>
    <button class="btn" data-scale="5000">1:5000</button>
  </div>
</div>

<a-scene
  embedded
  vr-mode-ui="enabled: false"
  renderer="antialias: true;"
  arjs="sourceType: webcam; debugUIEnabled: false;"
>

  <a-assets>
    <a-asset-item id="wink-model" src="models/WINK.glb"></a-asset-item>
  </a-assets>

  <a-marker
    id="marker"
    preset="hiro"
    emitevents="true"
    smooth="true"
    smoothCount="5"
    smoothTolerance="0.01"
    smoothThreshold="2"
  >

    <a-entity id="wrapper">
      <a-entity
        id="model"
        gltf-model="#wink-model"
        rotation="-90 0 0">
      </a-entity>
    </a-entity>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

<script>
const realWidth = 250; // reale Breite in Metern

const marker = document.getElementById('marker');
const model = document.getElementById('model');
const wrapper = document.getElementById('wrapper');
const ui = document.getElementById('ui');
const label = document.getElementById('label');
const buttons = document.querySelectorAll('.btn');

let modelWidth = null;

// Marker UI
marker.addEventListener('markerFound', () => {
  ui.style.display = 'flex';
});

marker.addEventListener('markerLost', () => {
  ui.style.display = 'none';
});

// Modell laden → echte Grösse berechnen
model.addEventListener('model-loaded', () => {

  const mesh = model.getObject3D('mesh');
  const box = new THREE.Box3().setFromObject(mesh);

  const size = new THREE.Vector3();
  const center = new THREE.Vector3();

  box.getSize(size);
  box.getCenter(center);

  modelWidth = size.x;

  // Modell zentrieren
  mesh.position.x -= center.x;
  mesh.position.z -= center.z;
  mesh.position.y -= box.min.y;

  console.log("Modellbreite:", modelWidth);

  setScale(500);
});

// Skalierung
function setScale(masstab) {

  if (!modelWidth) return;

  const targetWidth = realWidth / masstab;
  const scale = targetWidth / modelWidth;

  wrapper.setAttribute('scale', `${scale} ${scale} ${scale}`);

  label.textContent = `Massstab: 1:${masstab}`;

  buttons.forEach(btn => {
    btn.classList.remove('active');
    if (Number(btn.dataset.scale) === masstab) {
      btn.classList.add('active');
    }
  });
}

// Buttons
buttons.forEach(btn => {
  btn.addEventListener('click', () => {
    setScale(Number(btn.dataset.scale));
  });
});
</script>

</body>
</html>
